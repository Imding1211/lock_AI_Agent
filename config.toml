# ==========================================
# 8. 意圖偵測路由設定 (Intent Routing)
#    Router 用 LLM 分類後，依 target 派發至對應 Agent
# ==========================================

[[intents]]
name          = "hardware_tech"
label         = "硬體維修與技術支援"
description   = "使用者詢問電子鎖內部構造、鎖舌卡住、硬體故障排除、防回頭機制、或需要評估是否能安裝電子鎖等深度技術問題"
target        = "hardware_technician"
require_slots = false

[[intents]]
name          = "sales_and_service"
label         = "報價與客服流程"
description   = "使用者詢問維修或安裝費用、到府檢測費、代工安裝規範、服務預約流程或特定鎖型選擇建議"
target        = "sales_representative"
require_slots = false

[[intents]]
name          = "store_info"
label         = "門市與一般規格資訊"
description   = "使用者詢問門市地址、營業時間、聯絡電話、服務項目(開鎖/印章/遙控器)、電池挑選建議、支援的解鎖方式或緊急供電方式"
target        = "store_assistant"
require_slots = false

[[intents]]
name          = "app_support"
label         = "APP 操作與設定"
description   = "使用者詢問智慧鎖 APP（如 Chatlock AI-99）的操作步驟、解除綁定、邀請家人、權限設定、或清理緩存等軟體問題"
target        = "app_specialist"
require_slots = false

# -----基本intents-----
[[intents]]
name          = "web_search"
label         = "網路搜尋"
description   = "使用者詢問市場趨勢、產品比較、推薦等需要即時網路資訊的問題"
target        = "web_researcher"
require_slots = false

[[intents]]
name          = "general_reception"
label         = "一般接待與資料更新"
description   = "使用者提供個人資料（地址/電話）、一般問候、感謝、或與電子鎖相關但無明確專業需求的問題"
target        = "receptionist"
require_slots = false

[[intents]]
name          = "out_of_domain"
description   = "使用者的問題明顯與電子鎖、智慧門鎖完全無關，例如天氣、股票、美食推薦等"
target        = "out_of_domain"
require_slots = false

[[intents]]
name          = "transfer_human"
label         = "轉接真人客服"
description   = "使用者明確且堅持要求轉接真人客服，或涉及任何金錢相關話題（報價、費用、預算、分期、退款、付款方式等）。"
target        = "receptionist"
require_slots = false

