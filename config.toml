# ==========================================
# 9. 對話記憶儲存設定 (Memory / Checkpointer)
#    manage_memory 節點負責語意摘要壓縮
# ==========================================
[memory]
type                   = "postgres"           # "memory"（暫存）| "sqlite"（本地持久化）| "postgres"（資料庫）
postgres_uri_env       = "POSTGRES_URI"       # PostgreSQL 連線字串
# sqlite_path          = "./data/db/chat_history.db"  # sqlite 專用，回退時取消註解
max_messages_threshold = 50                   # messages 超過此數量時觸發語意摘要壓縮
context_retention_pair = 20                   # 壓縮後保留最近幾對對話（1 對 = 1 human + 1 ai）
router_context_pairs   = 3                    # router 意圖分類時，附帶最近幾輪對話作為上下文（同時濃縮問題給 agent）


# ==========================================
# 10. 必填資訊收集 (Slot Filling)
#     故障排除前，Agent 會主動詢問缺少的欄位
# ==========================================
[required_slots]
device_model = "使用者的電子鎖型號。"
device_brand = "使用者的電子鎖品牌。"


# ==========================================
# 11. 使用者輪廓記憶設定 (User Profile Memory)
#     跨對話持久化使用者個人資訊
# ==========================================
[user_profile]
enabled                = true
profile_dir            = "./data/profiles"
facts_enabled          = true
facts_postgres_uri_env = "POSTGRES_URI"
fact_attributes        = ["phone", "address", "device_model", "device_brand"]

[user_profile.extraction]
phone_regex   = '09\d{2}[\-\s]?\d{3}[\-\s]?\d{3}'
address_regex = '[\u4e00-\u9fff]*(?:市|縣)[\u4e00-\u9fff]*(?:區|鄉|鎮|市)[\u4e00-\u9fff\d\s\-]*(?:路|街|巷|弄|號|樓)[\u4e00-\u9fff\d\s\-]*'


# ==========================================
# 12. 審計日誌儲存設定 (Audit Log Storage)
#     持久化原始對話紀錄（user + AI）
# ==========================================
[storage]
type             = "postgres"
postgres_uri_env = "POSTGRES_URI"
# type           = "sqlite"                           # 回退時取消註解
# sqlite_path    = "./data/db/audit_log.db"


# ==========================================
# 13. Prompt 檔案路徑對照表
#     集中管理所有 prompt 模板的路徑
# ==========================================
[prompts]
router          = "agents/prompts/router.md"
summarizer      = "agents/prompts/summarize_messages.md"
merger          = "agents/prompts/merge_answers.md"
profile_updater = "agents/prompts/update_profile.md"
transfer_form   = "agents/prompts/transfer_human_form.md"
rewriter        = "agents/prompts/rewrite_query.md"
