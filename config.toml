# ==========================================
# 客服系統 - 核心設定檔 (config.toml)
# ==========================================
# 說明：
# 1. 本檔案定義系統所有可配置的行為，共 13 個區塊。
# 2. 帶有資安機密性質的資料，請寫在對應的 `_env` 變數中，並由 .env 檔案提供。
# 3. 若不需要某個功能，將該區塊全數加上 # 註解即可。
#
# 區塊索引：
#   1. [system]          — 系統全局設定
#   2. [debounce]        — 訊息緩衝設定
#   3. [line_bot]        — LINE Bot 設定
#   4. [templates]       — 系統回覆範本
#   5. [llm]             — 語言模型設定
#   6. [[databases]]     — 檢索工具定義（支援 chroma / pgvector / api / web_search）
#   7. [[agents]]        — Agent 定義
#   8. [[intents]]       — 意圖路由設定
#   9. [memory]          — 對話記憶與摘要壓縮
#  10. [required_slots]  — 必填資訊收集
#  11. [user_profile]    — 使用者輪廓記憶
#  12. [storage]         — 審計日誌儲存
#  13. [prompts]         — Prompt 檔案路徑
# ==========================================


# ==========================================
# 1. 系統全局設定
# ==========================================
[system]
domain          = "電子鎖、智慧門鎖相關的產品、安裝、故障排除與售後服務"
thread_prefix   = "smart_lock_"    # LangGraph thread ID 前綴
request_timeout = 120              # LangGraph 執行超時秒數
sensitive_keywords = ["報價", "價格", "多少錢", "費用", "金流", "退款", "匯款", "轉帳", "支付"]


# ==========================================
# 2. 訊息緩衝設定 (Debounce)
# ==========================================
[debounce]
buffer_wait       = 5.0   # 最後一則訊息後等待秒數，新訊息會重設計時器
buffer_ttl        = 300   # 緩衝區存活秒數，超過則強制清理
cleanup_interval  = 60    # 清理過期緩衝區的間隔秒數


# ==========================================
# 3. LINE Bot 系統設定
# ==========================================
[line_bot]
loading_animation_time = 60   # Loading 動畫顯示時間（秒，必須是 5 的倍數，範圍 5~60）


# ==========================================
# 4. 系統回覆罐頭訊息範本 (Templates)
# ==========================================
[templates]
push_fallback_prefix = "【系統通知】讓您久等了，以下是您的回覆：\n"   # Reply Token 過期時，Push API 的訊息前綴
error_timeout        = "不好意思，系統處理時間過長，請稍後再試一次。如果問題持續，建議轉接真人客服。"
error_system         = "不好意思，系統大腦剛剛稍微當機了一下，請稍後再試一次！"
error_no_reply       = "抱歉，系統沒有產生回覆。"


# ==========================================
# 5. 語言模型設定 (LLM)
# ==========================================
[llm]
provider    = "vertexai"          # 支援: "ollama" | "gemini" | "vertexai"
model_name  = "gemini-2.5-flash"  # Ollama: "gemma3:4b" / Gemini & Vertex AI: "gemini-2.5-flash"
temperature = 0.3                 # 數值越低回答越保守穩定 (0.0 ~ 1.0)

# Gemini 專用
api_key_env = "GEMINI_API_KEY"    # .env 中的 API Key 變數名稱

# Ollama 專用
base_url     = "http://localhost:11434"
base_url_env = "OLLAMA_BASE_URL"  # 優先讀取環境變數，若為空則使用上方 base_url

# Vertex AI 專用（需先執行 gcloud auth application-default login）
project_id_env = "VERTEX_PROJECT_ID"   # .env 中的 GCP 專案 ID
location_env   = "VERTEX_LOCATION"     # .env 中的 GCP 區域（例: us-central1）


# ==========================================
# 6. 檢索工具定義 (Databases / Retrievers)
#    Agent 透過 tools 欄位引用對應的資料庫名稱
# ==========================================

[[databases]]
name               = "db_video"
type               = "pgvector"
description        = "核心技術與維修知識庫：專門用於回答電子鎖「內部構造」、「鎖舌/鎖匣原理」、「硬體故障排除(卡住/反弓)」、「感應機制(防回頭/人臉)」及「安裝評估」等深度技術問題。"
collection_name    = "kb_video"
connection_uri_env = "PG_VECTOR_URI"
top_k              = 10
embedding_provider       = "vertexai"
embedding_model          = "text-embedding-004"
embedding_project_id_env = "VERTEX_PROJECT_ID"
embedding_location_env   = "VERTEX_LOCATION"
embedding_dimensions     = 768

[[databases]]
name               = "db_line_chat"
type               = "pgvector"
description        = "客服實務與報價知識庫：專門用於回答「各項維修/安裝費用」、「到府檢測費」、「代工安裝規範(如小米電子鎖)」、「服務預約流程」及「不同鎖型(葉片/分離/義大利)的選擇建議」。"
collection_name    = "kb_line_chat"
connection_uri_env = "PG_VECTOR_URI"
top_k              = 10
embedding_provider       = "vertexai"
embedding_model          = "text-embedding-004"
embedding_project_id_env = "VERTEX_PROJECT_ID"
embedding_location_env   = "VERTEX_LOCATION"
embedding_dimensions     = 768

[[databases]]
name               = "db_website"
type               = "pgvector"
description        = "營業資訊與產品規格知識庫：專門用於回答「門市地址」、「營業時間」、「聯絡電話」、「服務項目(開鎖/印章/遙控器)」、「電池挑選規範」、「緊急供電方式」及「支援的解鎖方式」。"
collection_name    = "kb_website"
connection_uri_env = "PG_VECTOR_URI"
top_k              = 10
embedding_provider       = "vertexai"
embedding_model          = "text-embedding-004"
embedding_project_id_env = "VERTEX_PROJECT_ID"
embedding_location_env   = "VERTEX_LOCATION"
embedding_dimensions     = 768

[[databases]]
name               = "db_youtube"
type               = "pgvector"
description        = "APP操作與設定教學庫：專門用於回答「Chatlock AI-99 智慧鎖 APP 的操作步驟」，包含「解除綁定」、「邀請家庭成員」、「權限設定(管理員)」及「清理緩存」等軟體設定問題。"
collection_name    = "kb_youtube"
connection_uri_env = "PG_VECTOR_URI"
top_k              = 10
ui_type            = "VIDEO_CARD"
embedding_provider       = "vertexai"
embedding_model          = "text-embedding-004"
embedding_project_id_env = "VERTEX_PROJECT_ID"
embedding_location_env   = "VERTEX_LOCATION"
embedding_dimensions     = 768

[[databases]]
name        = "db_order_api"
type        = "api"
description = "查詢即時訂單狀態與報修進度"
endpoint     = "https://api.sunnie-lock.com/v1/status"   # 公開測試網址
endpoint_env = "ORDER_API_URL"    # （優先）從 .env 讀取真實網址
token_env    = "ORDER_API_TOKEN"  # （選用）Bearer Token
method       = "GET"
timeout      = 5
query_param  = "keyword"    # 使用者問題放入的 query 參數（例: ?keyword=問題）
response_key = "message"    # 從 JSON 回傳中擷取的欄位名稱

[[databases]]
name        = "db_web_search"
type        = "web_search"
description = "網際網路搜尋引擎"
search_engine = "duckduckgo"   # 內建免費、免金鑰的搜尋引擎
max_results   = 3


# ==========================================
# 7. Agent 定義 (Multi-Agent Architecture)
#    每個 Agent 擁有獨立的 prompt 與工具集
# ==========================================

[[agents]]
name        = "hardware_technician"
label       = "硬體維修技師"
description = "負責回答電子鎖內部構造、鎖舌卡住、硬體故障排除、防回頭機制與安裝評估等深度技術問題"
tools       = ["db_video", "transfer_to_human"]
prompt_file = "agents/prompts/hardware_technician.md"

[[agents]]
name        = "sales_representative"
label       = "報價與客服專員"
description = "負責回答維修與安裝費用、到府檢測費、代工安裝規範與服務預約流程等問題"
tools       = ["db_line_chat", "transfer_to_human"]
prompt_file = "agents/prompts/sales_representative.md"

[[agents]]
name        = "store_assistant"
label       = "門市與規格助理"
description = "負責回答門市地址、營業時間、聯絡電話、服務項目與電池挑選規範等問題"
tools       = ["db_website", "transfer_to_human"]
prompt_file = "agents/prompts/store_assistant.md"

[[agents]]
name        = "app_specialist"
label       = "APP 設定專家"
description = "負責回答 Chatlock AI-99 等智慧鎖 APP 的操作步驟、解除綁定、邀請成員等軟體問題"
tools       = ["db_youtube", "transfer_to_human"]
prompt_file = "agents/prompts/app_specialist.md"

# -----基本Agent-----
[[agents]]
name        = "web_researcher"
label       = "網路搜尋助手"
description = "當內部資料庫不足時，負責搜尋網路資料"
tools       = ["db_web_search", "transfer_to_human"]
prompt_file = "agents/prompts/web_researcher.md"

[[agents]]
name        = "receptionist"
label       = "前台接待專員"
description = "負責一般問候、感謝、以及接收使用者更新個人資料等不需查閱知識庫的對話"
tools       = ["transfer_to_human"]
prompt_file = "agents/prompts/receptionist.md"

